<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="900" viewBox="0 0 1300 900">
  <defs>
    <style>
      .bg { fill: #06132a; }
      .box { fill: #1f1f1f; stroke: #d9d9d9; stroke-width: 2; }
      .title { fill: #f5f5f5; font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; }
      .subtitle { fill: #e8e8e8; font-family: Arial, sans-serif; font-size: 18px; }
      .text { fill: #f2f2f2; font-family: Arial, sans-serif; font-size: 16px; }
      .line { stroke: #e5e5e5; stroke-width: 2; fill: none; }
      .label { fill: #f2f2f2; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#e5e5e5" />
    </marker>
    <marker id="diamond" markerWidth="16" markerHeight="16" refX="7" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M1,8 L7,1 L13,8 L7,15 z" fill="#e5e5e5" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1300" height="900" />

  <!-- Component -->
  <rect class="box" x="390" y="40" width="520" height="350" />
  <line class="line" x1="390" y1="165" x2="910" y2="165" />
  <line class="line" x1="390" y1="215" x2="910" y2="215" />
  <text class="subtitle" x="650" y="95" text-anchor="middle">&lt;&lt;abstract&gt;&gt;</text>
  <text class="title" x="650" y="135" text-anchor="middle">Component</text>
  <text class="text" x="415" y="285">+add(component)</text>
  <text class="text" x="415" y="325">+remove(component)</text>
  <text class="text" x="415" y="365">+display(indent)</text>
  <text class="text" x="415" y="405">+total_price()</text>

  <!-- LeafProduct -->
  <rect class="box" x="90" y="510" width="420" height="330" />
  <line class="line" x1="90" y1="615" x2="510" y2="615" />
  <line class="line" x1="90" y1="745" x2="510" y2="745" />
  <text class="title" x="300" y="570" text-anchor="middle">LeafProduct</text>
  <text class="text" x="120" y="675">+name: str</text>
  <text class="text" x="120" y="715">+price: float</text>
  <text class="text" x="120" y="755">+details: str</text>
  <text class="text" x="120" y="805">+display(indent)</text>
  <text class="text" x="120" y="845">+total_price()</text>

  <!-- CompositeComponent -->
  <rect class="box" x="660" y="490" width="560" height="350" />
  <line class="line" x1="660" y1="595" x2="1220" y2="595" />
  <line class="line" x1="660" y1="705" x2="1220" y2="705" />
  <text class="title" x="940" y="550" text-anchor="middle">CompositeComponent</text>
  <text class="text" x="690" y="655">+name: str</text>
  <text class="text" x="690" y="695">+children: list&lt;Component&gt;</text>
  <text class="text" x="690" y="755">+add(component)</text>
  <text class="text" x="690" y="795">+remove(component)</text>
  <text class="text" x="690" y="835">+display(indent)</text>
  <text class="text" x="690" y="875">+total_price()</text>

  <!-- Inheritance arrows -->
  <path class="line" d="M280 510 C260 430, 260 420, 390 365" marker-end="url(#arrow)" />
  <path class="line" d="M760 490 C720 440, 700 420, 650 392" marker-end="url(#arrow)" />

  <!-- Composition relation -->
  <path class="line" d="M980 390 C1020 430, 1030 460, 1010 490" marker-end="url(#diamond)" />
  <text class="label" x="905" y="430">0..*</text>
  <text class="label" x="1028" y="470">1</text>
  <text class="label" x="980" y="450">children</text>
</svg>

